version: '3.8'

services:
  embedding-api:
    build:
      context: .
      dockerfile: Dockerfile.cn
    restart: unless-stopped
    ports:
      - "${PORT:-6008}:${PORT:-6008}"
    # 移除 volumes 挂载，因为模型已经打包在镜像中
    env_file:
      - .env
    environment:
      # Qwen3 模型配置（已打包在镜像中）
      - MODEL_PATH=${MODEL_PATH:-/app/models/Qwen3-Embedding-4B}
      - DEVICE=${DEVICE:-cuda}  # 如果没有GPU，可以设置为cpu
      - PORT=${PORT:-6008}
      - API_KEY=${API_KEY}
      # Qwen3 优化配置
      - TARGET_DIM=${TARGET_DIM:-1536}  # Qwen3 嵌入维度
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-20}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-64}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-0.2}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-2000}
      - THREAD_POOL_SIZE=${THREAD_POOL_SIZE:-8}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-300}
      - MAX_RETRIES=${MAX_RETRIES:-5}
      - RETRY_DELAY=${RETRY_DELAY:-0.5}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
